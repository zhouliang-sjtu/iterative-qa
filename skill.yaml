name: "iterative-qa"
version: "4.0.0"
description: "AI驱动的智能多视角质量校验引擎 — 26位视角专家全量扫描 + CI门禁 + 风险评分 + 增量diff + 基线对比"
author:
  name: "周良"
  email: "zhouliang@shsmu.edu.cn"
  organization: "上海交通大学医学院"
category: "开发工具"
tags:
  - "代码质量"
  - "自动化测试"
  - "工程优化"
  - "多视角分析"
  - "AI辅助开发"
  - "CI/CD"
  - "质量保证"
  - "安全审计"
  - "隐私合规"
  - "医疗信息化"

# 技能入口配置
entry:
  type: "markdown"
  file: "SKILL.md"

# 功能特性
features:
  - name: "26位视角专家全量扫描"
    description: "代码到生产的全链路覆盖：编写→测试→审查→安全→ETL→PHI→部署→可观测性"
  - name: "CI/CD 门禁模式"
    description: "critical=0 / high≤5 / medium≤30 阈值门禁，exit_code 自动判定"
  - name: "项目风险评分引擎"
    description: "加权评分 + 归一化风险等级 + top-N 风险项排序"
  - name: "增量 QA 扫描"
    description: "git diff 变更文件/行级扫描，pre-commit / PR 检查可用"
  - name: "基线对比追踪"
    description: "保存基线，追踪改善/恶化趋势，量化 QA 效果"
  - name: "迭代收敛机制"
    description: "指纹追踪多轮运行，自动判定收敛并输出最终报告"
  - name: "大模型报告生成"
    description: "7 家大模型提供商适配，自动生成专业质量报告"
  - name: "医疗领域专项支持"
    description: "PHI 隐私扫描、医学数据校验、HIPAA 合规、ETL 完整性"

# 支持的项目类型
supported_projects:
  - "Web应用"
  - "移动应用"
  - "桌面应用"
  - "后端服务"
  - "数据工程"
  - "AI/ML项目"
  - "医疗信息系统"

# 技术栈要求
requirements:
  - "Python 3.10+"
  - "Git"

# 定价模型
pricing:
  type: "free"
  note: "完全免费使用，欢迎捐赠支持"
  donation:
    wechat: "赞赏码（扫码支持）"
    alipay: "赞赏码（扫码支持）"
    github_sponsors: "https://github.com/sponsors/zhouliang-sjtu"

# 服务条款
terms:
  privacy_policy: "https://example.com/privacy"
  service_agreement: "https://example.com/terms"

# 兼容性
compatibility:
  platforms:
    - "Windows"
    - "macOS"
    - "Linux"
  frameworks:
    - "FastAPI"
    - "Django"
    - "Flask"
    - "React"
    - "Vue"
    - "TypeScript"

# 认证信息
certifications:
  - "ISO 27001"
  - "GDPR Compliant"
