# iterative-qa 配置文件
# 用于自定义验证策略和迭代流程

# 视角专家配置
perspectives:
  - name: developer
    enabled: true
    priority: high
    description: "代码质量、类型安全、架构设计验证"
  
  - name: security
    enabled: true
    priority: high
    description: "漏洞扫描、渗透测试、数据加密验证"
  
  - name: healthcare
    enabled: true
    priority: medium
    description: "医疗数据合规性、HIPAA合规、数据脱敏验证"
  
  - name: auditor
    enabled: true
    priority: medium
    description: "合规性、可追溯性、审计日志验证"
  
  - name: statistician
    enabled: true
    priority: medium
    description: "算法正确性、数据质量、模型验证"
  
  - name: performance
    enabled: true
    priority: medium
    description: "负载测试、响应时间、资源消耗验证"
  
  - name: compliance
    enabled: true
    priority: low
    description: "行业标准合规性验证（GDPR、ISO27001等）"
  
  - name: business
    enabled: true
    priority: low
    description: "需求一致性、业务流程正确性验证"
  
  - name: architect
    enabled: true
    priority: low
    description: "系统架构、模块耦合、技术债务评估"
  
  - name: devops
    enabled: true
    priority: low
    description: "可观测性、容错能力、扩展性验证"
  
  - name: user
    enabled: true
    priority: medium
    description: "用户体验、可用性、界面友好性验证"

# 验证策略配置
validation:
  max_rounds: 10
  convergence_threshold: 2
  auto_fix: false
  parallel_execution: true
  timeout_per_expert: 300

# 问题分级配置
severity:
  critical:
    label: "P0"
    description: "服务不可启动 / 核心功能不可用"
    response_time: "立即修复"
  high:
    label: "P1"
    description: "部分功能异常 / 数据不完整"
    response_time: "本迭代修复"
  medium:
    label: "P2"
    description: "不影响功能但不符合最佳实践"
    response_time: "记录，后续修复"
  low:
    label: "P3"
    description: "优化建议 / 非关键问题"
    response_time: "记录到backlog"

# 收敛判定配置
convergence:
  strict_mode: false
  consecutive_clean_rounds: 2
  max_issues_allowed:
    critical: 0
    high: 0
    medium: 3
    low: 10

# 报告配置
report:
  format: markdown
  include_summary: true
  include_details: true
  include_recommendations: true
  output_directory: ./reports
  timestamp_format: "%Y-%m-%d %H:%M:%S"

# 医疗领域专项配置
healthcare:
  hipaa_compliance: true
  data_desensitization: true
  hl7_fhir_check: true
  medical_terminology_validation: true

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
  file_path: ./logs/iterative-qa.log
  max_file_size: 10MB
  backup_count: 5