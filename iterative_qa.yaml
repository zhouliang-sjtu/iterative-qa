# iterative-qa 配置文件 v4.0.0
# 26位视角专家 × 5种能力 — 全链路质量校验

# 视角专家配置（全部 26 位，默认全部启用）
perspectives:
  # ── 代码层 ──
  - name: developer
    enabled: true
    description: "编译检查、类型安全、架构设计验证"
  - name: hardcode_inspector
    enabled: true
    description: "硬编码值检测、跨文件重复追踪、模拟数据/密钥泄露"
  - name: auditor
    enabled: true
    description: "异常处理审计、bare except、日志完整性"
  - name: linter
    enabled: true
    description: "ruff/flake8/pylint/mypy 四合一代码质量检查"

  # ── 测试层 ──
  - name: tester
    enabled: true
    description: "pytest 执行 + 测试覆盖率分级报告"
  - name: dependency
    enabled: true
    description: "pip-audit 漏洞扫描 + 过期依赖检查 + 版本锁定"

  # ── 安全层 ──
  - name: security
    enabled: true
    description: "eval/注入/反序列化/弱加密 7类漏洞检测"
  - name: phi_inspector
    enabled: true
    description: "PHI 隐私审计 — 日志泄露/导出未脱敏/API返回/密钥泄露"
  - name: compliance
    enabled: true
    description: "许可证/GPL依赖/CRLF编码检查"

  # ── 数据层 ──
  - name: statistician
    enabled: true
    description: "过拟合/NaN/数据泄露/数值稳定性 6类统计建模检查"
  - name: data_integrity
    enabled: true
    description: "ETL 行数/主键/外键/时间戳/数值范围完整性"
  - name: med_validator
    enabled: true
    description: "医疗数据格式校验 — 年龄/血压/ICD/身份证"

  # ── 架构层 ──
  - name: architect
    enabled: true
    description: "循环导入检测 + 大模块识别 (>500行)"
  - name: api_contract
    enabled: true
    description: "API 契约 — endpoint/超时/限流/分页/输入校验"
  - name: concurrency
    enabled: true
    description: "async阻塞/共享状态无锁/死锁/session泄露"
  - name: db_migration
    enabled: true
    description: "Alembic 同步/downgrade/Django migration"

  # ── 质量层 ──
  - name: performance
    enabled: true
    description: "N+1查询/内存炸弹/阻塞IO/深层嵌套 5类检测"
  - name: business
    enabled: true
    description: "README/CHANGELOG/.gitignore 完整性"
  - name: frontend
    enabled: true
    description: "package.json/tsc/ESLint 前端工程检查"
  - name: user
    enabled: true
    description: "UI框架/组件库/可访问性/响应式设计"

  # ── 部署层 ──
  - name: devops
    enabled: true
    description: "Docker/.dockerignore/CI配置/.env.example"
  - name: production_readiness
    enabled: true
    description: "环境变量/连接池/优雅关闭/幂等/超时/重试"
  - name: observability
    enabled: true
    description: "结构化日志/trace/health/metrics/Sentry"
  - name: config_audit
    enabled: true
    description: ".env 漂移/硬编码IP端口/多环境一致性"

  # ── 领域层 ──
  - name: healthcare
    enabled: true
    description: "HIPAA合规性、数据脱敏建议、HL7 FHIR标准"

# 验证策略配置
validation:
  mode: full                    # full=26位全量扫描 | targeted=top-5高兼容专家
  max_rounds: 10
  convergence_threshold: 2
  auto_fix: false
  timeout_per_expert: 300

# 问题分级配置
severity:
  critical:
    label: "P0"
    description: "服务不可启动 / 核心功能不可用 / PHI泄露"
    weight: 100
  high:
    label: "P1"
    description: "部分功能异常 / 数据不完整 / 安全漏洞"
    weight: 50
  medium:
    label: "P2"
    description: "不影响功能但不符合最佳实践"
    weight: 15
  low:
    label: "P3"
    description: "优化建议 / 非关键问题"
    weight: 3

# CI 门禁阈值
ci_gate:
  critical: 0       # 0 个 critical 才放行
  high: 5           # ≤5 个 high
  medium: 30        # ≤30 个 medium

# 收敛判定配置
convergence:
  consecutive_clean_rounds: 2
  max_new_critical: 0
  max_new_high: 0

# 报告配置
report:
  format: markdown
  include_summary: true
  include_details: true
  include_recommendations: true
  baseline_file: .iterative_qa_baseline.json
  output_directory: ./reports

# 医疗领域专项配置
healthcare:
  phi_scan: true                    # PHI 隐私扫描
  data_integrity: true              # ETL 完整性
  medical_validation: true          # 医学数据校验
  hipaa_compliance: true
  hl7_fhir_check: true
  icd_coding_check: true

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
  file_path: ./logs/iterative-qa.log
